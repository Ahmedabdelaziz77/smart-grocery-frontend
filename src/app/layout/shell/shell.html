<div class="shell">
  <aside class="sidebar">
    <div class="sidebar__top">
      <div class="logo">SmartGrocery</div>

      <nav class="nav">
        @for (item of navItems; track item.route) {
        <a class="nav__link" [routerLink]="item.route" routerLinkActive="nav__link--active">
          {{ item.label }}
        </a>
        }
      </nav>
    </div>

    <div class="sidebar__bottom">
      <div class="user-box">
        <div class="user-box__name">John Doe</div>
        <div class="user-box__role">USER</div>
      </div>

      <button class="logout-btn" type="button">Logout</button>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
