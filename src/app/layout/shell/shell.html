<div class="shell">
  <aside class="sidebar">
    <div class="sidebar__top">
      <div class="logo">
        <span class="logo__icon material-icons">shopping_cart</span>
        SmartGrocery
      </div>

      <nav class="nav">
        @for (item of navItems(); track item.route) {
        <a class="nav__link" [routerLink]="item.route" routerLinkActive="nav__link--active">
          <span class="material-icons nav__icon">{{ item.icon }}</span>
          {{ item.label }}
        </a>
        }
      </nav>
    </div>

    <div class="sidebar__bottom">
      <div class="user-box">
        <div class="user-box__avatar">{{ userInitial() }}</div>
        <div class="user-box__info">
          <div class="user-box__name">
            {{ currentUser()?.fullName || 'Guest User' }}
          </div>
          <div class="user-box__role">
            {{ role() || 'User' }}
          </div>
        </div>
      </div>

      <button class="logout-btn" type="button" (click)="onLogout()">
        <span class="material-icons logout-btn__icon">logout</span>
        Logout
      </button>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
